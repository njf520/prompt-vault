<svg width="100%" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PromptVault architecture diagram</title>
  <desc>Three-tier architecture: browser client calls FastAPI service which reads and writes a JSON file store</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Tier 1: Browser -->
  <rect x="140" y="20" width="400" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" fill="#085041" x="340" y="45" text-anchor="middle" dominant-baseline="central">Browser client</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="65" text-anchor="middle" dominant-baseline="central">Vanilla JS + HTML/CSS — no build step</text>

  <!-- Arrow down -->
  <line x1="340" y1="84" x2="340" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="356" y="108" dominant-baseline="central">HTTP / REST</text>

  <!-- Tier 2: FastAPI outer box -->
  <rect x="40" y="124" width="600" height="216" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" fill="#26215C" x="340" y="150" text-anchor="middle" dominant-baseline="central">FastAPI service</text>

  <!-- Row 1 -->
  <rect x="60" y="166" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="76" y="183" dominant-baseline="central">POST /api/prompts</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="76" y="200" dominant-baseline="central">Create prompt (v1)</text>

  <rect x="348" y="166" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="364" y="183" dominant-baseline="central">PUT /api/prompts/{name}</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="364" y="200" dominant-baseline="central">Commit new version</text>

  <!-- Row 2 -->
  <rect x="60" y="218" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="76" y="235" dominant-baseline="central">GET /api/prompts/{name}</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="76" y="252" dominant-baseline="central">Fetch latest or pinned version</text>

  <rect x="348" y="218" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="364" y="235" dominant-baseline="central">GET …/{name}/diff</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="364" y="252" dominant-baseline="central">Unified diff between versions</text>

  <!-- Row 3 -->
  <rect x="60" y="270" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="76" y="287" dominant-baseline="central">GET …/{name}/history</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="76" y="304" dominant-baseline="central">Full version list</text>

  <rect x="348" y="270" width="272" height="44" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#2C2C2A" x="364" y="287" dominant-baseline="central">DELETE /api/prompts/{name}</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="364" y="304" dominant-baseline="central">Remove prompt + all versions</text>

  <!-- Arrow down -->
  <line x1="340" y1="340" x2="340" y2="382" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="356" y="365" dominant-baseline="central">read / write</text>

  <!-- Tier 3: JSON store -->
  <rect x="140" y="382" width="400" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-weight="500" font-size="14" fill="#412402" x="340" y="404" text-anchor="middle" dominant-baseline="central">JSON file store (vault.json)</text>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" x="340" y="422" text-anchor="middle" dominant-baseline="central">Swappable for SQLite or Postgres</text>
</svg>
